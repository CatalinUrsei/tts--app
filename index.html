<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Text to Speech</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 750px;
      background: #111827;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 140px;
      border-radius: 12px;
      border: none;
      padding: 12px;
      font-size: 14px;
      outline: none;
      resize: none;
    }

    select, input[type="range"] {
      width: 100%;
      margin-top: 10px;
    }

    .row {
      margin-top: 15px;
    }

    label {
      font-size: 13px;
      opacity: 0.8;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .play { background: #22c55e; color: white; }
    .stop { background: #ef4444; color: white; }

    .pitch-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .value {
      text-align: center;
      font-size: 13px;
      margin-top: 4px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🎙 Text to Speech</h2>

  <textarea id="text" placeholder="Scrie textul aici..."></textarea>

  <div class="row">
    <label>Voce</label>
    <select id="voices"></select>
  </div>

  <div class="row">
    <label>Volum</label>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
  </div>

  <div class="row">
    <label>Viteză</label>
    <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
  </div>

  <!-- 🔥 PITCH SLIDER MODERN -->
  <div class="row">
    <label>Pitch (voce)</label>
    <input type="range" id="pitch" min="0.5" max="2" step="0.01" value="1" oninput="updatePitchValue()">

    <div class="pitch-info">
      <span>🐭 Pitigăiat</span>
      <span>🧔 Grav</span>
    </div>

    <div class="value">
      Valoare: <span id="pitchValue">1.00</span>
    </div>
  </div>

  <div class="buttons">
    <button class="play" onclick="speak()">▶ Speak</button>
    <button class="stop" onclick="stop()">⏹ Stop</button>
  </div>

</div>

<script>
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const select = document.getElementById("voices");

  select.innerHTML = "";

  voices.forEach((voice, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = voice.name + " (" + voice.lang + ")";
    select.appendChild(option);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function updatePitchValue() {
  const val = document.getElementById("pitch").value;
  document.getElementById("pitchValue").innerText = parseFloat(val).toFixed(2);
}

function speak() {
  const text = document.getElementById("text").value;
  const voiceIndex = document.getElementById("voices").value;

  const utterance = new SpeechSynthesisUtterance(text);

  utterance.voice = voices[voiceIndex];

  utterance.volume = parseFloat(document.getElementById("volume").value);
  utterance.rate = parseFloat(document.getElementById("rate").value);
  utterance.pitch = parseFloat(document.getElementById("pitch").value);

  speechSynthesis.speak(utterance);
}

function stop() {
  speechSynthesis.cancel();
}
</script>

</body>
</html>

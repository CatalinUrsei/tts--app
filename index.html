<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Text to Speech</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      font-size: 14px;
      outline: none;
      resize: none;
    }

    select, input[type="range"] {
      width: 100%;
      margin-top: 10px;
    }

    .row {
      margin-top: 15px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .play { background: #22c55e; color: white; }
    .stop { background: #ef4444; color: white; }

    button:hover {
      transform: scale(1.03);
    }

    .pitch-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .pitch-buttons button {
      background: #334155;
      color: white;
    }

    .pitch-buttons button.active {
      background: #3b82f6;
    }

    label {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🎙 Text to Speech</h2>

  <textarea id="text" placeholder="Scrie textul aici..."></textarea>

  <div class="row">
    <label>Voce</label>
    <select id="voices"></select>
  </div>

  <div class="row">
    <label>Volum</label>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
  </div>

  <div class="row">
    <label>Viteză</label>
    <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
  </div>

  <div class="row">
    <label>Pitch</label>
    <div class="pitch-buttons">
      <button onclick="setPitch(0.5)">🎤 Grav</button>
      <button onclick="setPitch(1)" class="active">🎧 Normal</button>
      <button onclick="setPitch(1.5)">🔊 Subțire</button>
    </div>
  </div>

  <div class="buttons">
    <button class="play" onclick="speak()">▶ Speak</button>
    <button class="stop" onclick="stop()">⏹ Stop</button>
  </div>
</div>

<script>
let voices = [];
let pitchValue = 1;

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const select = document.getElementById("voices");

  select.innerHTML = "";
  voices.forEach((voice, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = voice.name + " (" + voice.lang + ")";
    select.appendChild(option);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function setPitch(value) {
  pitchValue = value;

  document.querySelectorAll(".pitch-buttons button")
    .forEach(btn => btn.classList.remove("active"));

  event.target.classList.add("active");
}

function speak() {
  const text = document.getElementById("text").value;
  const voiceIndex = document.getElementById("voices").value;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.voice = voices[voiceIndex];

  utterance.volume = parseFloat(document.getElementById("volume").value);
  utterance.rate = parseFloat(document.getElementById("rate").value);
  utterance.pitch = pitchValue;

  speechSynthesis.speak(utterance);
}

function stop() {
  speechSynthesis.cancel();
}
</script>

</body>
</html>
